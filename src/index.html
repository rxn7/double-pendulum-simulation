<!DOCTYPE html>
<html lang="pl">
	<head>
		<title>Podwójne wahadło</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
		<meta charset="UTF-8" />
	</head>

	<body>
		<div id="main-container">
			<header>
				<h1>Symulator Podwójnego Wahadła</h1>
			</header>

			<main>
				<canvas id="simulation-canvas" width="600" height="600"></canvas>
	 
				<form id="controls-container" autocomplete="off">
					<div class="control-row">
						<label for="gravity-input">Grawitacja:</label>
						<input type="range" id="gravity-input" min="0" max="20" value="9.8" step="0.1">
						<span id="gravity-value-display" class="value-display">9.8m/s</span>
					</div>

					<div class="control-row">
						<label for="mass1-input">Masa 1:</label>
						<input type="range" id="mass1-input" min="1" max="10" value="2.0" step="0.1">
						<span id="mass1-value-display" class="value-display">2.0kg</span>
					</div>

					<div class="control-row">
						<label for="mass2-input">Masa 2:</label>
						<input type="range" id="mass2-input" min="1" max="10" value="2.0" step="0.1">
						<span id="mass2-value-display" class="value-display">2.0kg</span>
					</div>

					<div class="control-row">
						<label for="length1-input">Długość 1:</label>
						<input type="range" id="length1-input" min="0.1" max="10" value="1.0" step="0.1">
						<span class="value-display">1.0m</span>
					</div>

					<div class="control-row">
						<label for="length2-input">Długość 2:</label>
						<input type="range" id="length2-input" min="0.1" max="10" value="1.0" step="0.1">
						<span class="value-display">1.0m</span>
					</div>
				</form>
			</main>

			<footer>
				<p><a href="https://rxn.lol">Maciej Niziołek</a> | WSB-NLU Nowy Sącz 2026 | <a href="https://github.com/rxn7/double-pendulum-simulation" target="_blank">Kod źródłowy, dokumentacja projektu</a></p>	
			</footer>
		</div>
	</body>

	<script type="module" src="bundle.js"></script>
</html>
